name: Template Registry

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Discover templates from GitHub
        id: discover
        run: |
          templates='[]'
          page=1
          total=0

          while true; do
            resp=$(curl -s "https://api.github.com/search/repositories?q=topic:naeos-template&sort=updated&per_page=100&page=$page")
            count=$(echo "$resp" | jq '.items | length')
            if [ "$count" = "0" ] || [ "$count" = "null" ]; then break; fi

            for row in $(echo "$resp" | jq -c '.items[]'); do
              name=$(echo "$row" | jq -r '.name')
              desc=$(echo "$row" | jq -r '.description // "NAEOS starter template"')
              full_name=$(echo "$row" | jq -r '.full_name')
              html_url=$(echo "$row" | jq -r '.html_url')
              stars=$(echo "$row" | jq -r '.stargazers_count')
              updated=$(echo "$row" | jq -r '.updated_at')
              topics=$(echo "$row" | jq -c '.topics')

              tags=$(echo "$topics" | jq -c '[.[] | select(. != "naeos-template")]')
              author=$(echo "$full_name" | cut -d/ -f1)
              lang=$(echo "$row" | jq -r '.language // "unknown"')
              languages="[\"$(echo "$lang" | tr '[:upper:]' '[:lower:]')\"]"

              entry=$(jq -n \
                --arg n "$name" \
                --arg d "$desc" \
                --arg a "$author" \
                --arg u "$html_url" \
                --argjson s $stars \
                --arg t "$updated" \
                --argjson tags "$tags" \
                --argjson langs "$languages" \
                '{name: $n, version: "0.1.0", description: $d, author: $a, tags: $tags, repo_url: $u, download_url: "", languages: $langs, frameworks: [], downloads: 0, updated_at: $t}')

              templates=$(echo "$templates" | jq --argjson e "$entry" '. + [$e]')
              total=$((total + 1))
            done

            page=$((page + 1))
            if [ "$page" -gt 5 ]; then break; fi
          done

          echo "found=$total" >> $GITHUB_OUTPUT

          official=$(cat site/static/templates/registry.json 2>/dev/null || echo '{"templates":[]}')
          merged=$(echo "$templates" | jq --argjson official "$official" '{"templates": ($official.templates + .)}')
          echo "$merged" > site/data/templates/registry.json
          echo "$merged" > site/static/templates/registry.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet site/data/templates/registry.json site/static/templates/registry.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update template registry (${{ steps.discover.outputs.found }} community templates)"
          title: "Template registry update (${{ steps.discover.outputs.found }} community templates)"
          body: |
            Automated template registry update from GitHub topic `naeos-template`.

            - **Official templates**: curated entries in `site/static/templates/registry.json`
            - **Community templates**: ${{ steps.discover.outputs.found }} repos found with `naeos-template` topic
          branch: chore/template-registry-update
          base: main
          delete-branch: true
