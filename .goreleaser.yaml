project_name: naeos
before:
  hooks:
    - go mod tidy
builds:
  - main: ./cmd/naeos
    binary: naeos
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/NAEOS-foundation/naeos/internal/version.Version={{.Version}}
      - -X github.com/NAEOS-foundation/naeos/internal/version.GitCommit={{.Commit}}
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: "checksums.txt"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
docker:
  - image_templates:
      - "ghcr.io/naeos-foundation/naeos:{{ .Version }}-amd64"
      - "ghcr.io/naeos-foundation/naeos:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
