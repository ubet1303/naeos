<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#66b3ff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#66b3ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo N geometric -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="28" height="200" rx="4" fill="#00ff88" opacity="0.3"/>
    <rect x="28" y="0" width="28" height="200" rx="4" fill="#00ff88" opacity="0.6"/>
    <rect x="56" y="40" width="28" height="160" rx="4" fill="#00ff88"/>
  </g>

  <!-- Title -->
  <text x="160" y="250" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="#e0e0e0" letter-spacing="-1.5">NAEOS</text>

  <!-- Tagline -->
  <text x="160" y="320" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600" fill="url(#accent)" letter-spacing="-0.5">Specify Once. Build Anywhere.</text>

  <!-- Description -->
  <text x="160" y="380" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#888" letter-spacing="0.2">Declarative Engineering Platform · Open Source · Apache 2.0</text>

  <!-- Badges -->
  <rect x="160" y="420" width="80" height="32" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="200" y="442" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#00ff88" text-anchor="middle" font-weight="600">Go</text>

  <rect x="256" y="420" width="100" height="32" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="306" y="442" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#66b3ff" text-anchor="middle" font-weight="600">35+ CLI</text>

  <rect x="372" y="420" width="110" height="32" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="427" y="442" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#7C3AED" text-anchor="middle" font-weight="600">6 AI Adapters</text>

  <!-- Grid decoration -->
  <g stroke="#333" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>
</svg>
