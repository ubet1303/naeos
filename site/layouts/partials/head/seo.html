<meta name="keywords" content="NAEOS, declarative engineering, platform engineering, NEIR, specification, code generation, AI compiler, open source">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="apple-touch-icon" href="/images/icon-192.svg">
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">
<meta property="og:description" content="{{ .Description | default .Site.Params.description }}">
<meta property="og:type" content="{{ if or .IsHome (ne .Section "blog") }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ "images/og-default.svg" | absURL }}">
<meta property="og:image:type" content="image/svg+xml">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image" content="{{ "images/og-default.png" | absURL }}">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image" content="{{ "images/og-default-light.png" | absURL }}">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="NAEOS">
<meta property="og:locale" content="{{ if eq .Lang "id" }}id_ID{{ else }}en_US{{ end }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">
<meta name="twitter:description" content="{{ .Description | default .Site.Params.description }}">
<meta name="twitter:image" content="{{ "images/og-default.svg" | absURL }}">
<meta name="twitter:image:width" content="1200">
<meta name="twitter:image:height" content="630">
{{ range .Translations }}
<link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}">
{{ end }}
<link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}">
<link rel="alternate" hreflang="en" href="{{ .Site.BaseURL }}">
{{ if .Date }}
<meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
{{ end }}
{{ with .Params.categories }}{{ range . }}
<meta property="article:tag" content="{{ . }}">
{{ end }}{{ end }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@graph": [
        {
            "@type": "SoftwareApplication",
            "name": "NAEOS",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "Linux, macOS, Windows",
            "description": "{{ .Site.Params.description }}",
            "url": "{{ .Site.BaseURL }}",
            "author": { "@type": "Organization", "name": "NAEOS Foundation" },
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "softwareVersion": "{{ .Site.Params.version }}",
            "downloadUrl": "{{ "download/" | absURL }}",
            "screenshot": "{{ "images/og-default.svg" | absURL }}"
        },
        {
            "@type": "WebSite",
            "name": "NAEOS",
            "url": "{{ .Site.BaseURL }}",
            "potentialAction": {
                "@type": "SearchAction",
                "target": "{{ "search/" | absURL }}?q={search_term_string}",
                "query-input": "required name=search_term_string"
            },
            {{ if not .IsHome }}
            "breadcrumb": {
                "@type": "BreadcrumbList",
                "itemListElement": [
                    { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ .Site.BaseURL }}" }{{ $pos := 2 }}
                    {{- range .Ancestors.Reverse }}{{ if ne . $.Site.Home }}
                    ,{ "@type": "ListItem", "position": {{ $pos }}, "name": "{{ .Title }}", "item": "{{ .Permalink }}" }{{ $pos = add $pos 1 }}
                    {{ end }}{{ end }}
                    ,{ "@type": "ListItem", "position": {{ $pos }}, "name": "{{ .Title }}" }
                ]
            }
            {{ end }}
        }{{ if eq .Section "faq" }},
        {
            "@type": "FAQPage",
            "mainEntity": [
                {{ range (findRE `(?s)<div class="faq-item">.*?</div>` .Content 50) }}{{ $q := index (findRE `(?s)<button class="faq-question">\s*<span>(.*?)</span>` . 1) 0 }}{{ $a := index (findRE `(?s)<div class="faq-answer">\s*<p>(.*?)</p>` . 1) 0 }}
                {
                    "@type": "Question",
                    "name": {{ $q | plainify | jsonify }},
                    "acceptedAnswer": { "@type": "Answer", "text": {{ $a | plainify | jsonify }} }
                }{{ if ne . (index (findRE `(?s)<div class="faq-item">.*?</div>` $.Content 50) (sub (len (findRE `(?s)<div class="faq-item">.*?</div>` $.Content 50)) 1)) }},{{ end }}
                {{ end }}
            ]
        }
        {{ end }}{{ if eq .Section "blog" }},
        {
            "@type": "BlogPosting",
            "headline": "{{ .Title }}",
            "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
            "author": { "@type": "Organization", "name": "NAEOS Foundation" },
            "publisher": {
                "@type": "Organization",
                "name": "NAEOS Foundation",
                "logo": { "@type": "ImageObject", "url": "{{ "favicon.svg" | absURL }}" }
            },
            "description": "{{ .Description | default .Site.Params.description }}"
        }
        {{ end }}{{ if and (ge .WordCount 1000) (eq .Section "docs") }},
        {
            "@type": "TechArticle",
            "headline": "{{ .Title }}",
            "description": "{{ .Description }}",
            "datePublished": "{{ .Date.Format "2006-01-02" }}",
            "author": { "@type": "Organization", "name": "NAEOS Foundation" },
            "publisher": {
                "@type": "Organization",
                "name": "NAEOS Foundation",
                "logo": { "@type": "ImageObject", "url": "{{ "favicon.svg" | absURL }}" }
            },
            "wordCount": {{ .WordCount }},
            "timeRequired": "PT{{ .ReadingTime }}M"
        }
        {{ end }}
    ]
}
</script>
