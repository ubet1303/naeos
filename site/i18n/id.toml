[section_what_is]
other = "Apa itu NAEOS?"

[section_what_is_desc]
other = "NAEOS (Nusantara Engineering & Architecture Operating System) bukan sekadar generator proyek. NAEOS adalah runtime rekayasa yang memahami spesifikasi, membangun model internal (NEIR), mengatur rencana eksekusi, menghasilkan artefak, memvalidasi hasil, dan menjaga proyek tetap selaras dengan spesifikasi sepanjang siklus hidupnya."

