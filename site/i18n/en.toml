[feature_pipeline]
other = "Pipeline Engine"

[feature_pipeline_desc]
other = "9-stage DAG pipeline from parsing to export. Parse, normalize, resolve, build, validate, schedule, generate, compile, and export — with full observability at every stage."

[feature_compiler]
other = "AI Compiler"

[feature_compiler_desc]
other = "Transform NEIR into AI instruction sets for 6 platforms: GitHub Copilot, Claude Code, Cursor, Gemini CLI, Codex, and OpenCode."

[feature_generator]
other = "Code Generator"

[feature_generator_desc]
other = "Generate production-ready code in Go, TypeScript, Python, Java, and Rust. Template-driven with per-language adapters."

[feature_neir]
other = "NEIR Model"

[feature_neir_desc]
other = "NAEOS Engineering Intermediate Representation — a canonical model that describes the entire system: project, architecture, modules, services, APIs, infrastructure, and security."

[feature_governance]
other = "Governance & Policy"

[feature_governance_desc]
other = "Built-in policy engine with 7 operators, RBAC, audit trails, and artifact review. Keep your team aligned with organizational rules."

[feature_marketplace]
other = "Marketplace"

[feature_marketplace_desc]
other = "Publish, discover, and install industry profiles and plugins. 5 built-in profiles: SaaS, AI Agent, FinTech, Healthcare, Government."

