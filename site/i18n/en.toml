[section_what_is]
other = "What is NAEOS?"

[section_what_is_desc]
other = "NAEOS (Nusantara Engineering & Architecture Operating System) is not just a project generator. It is an engineering runtime that understands specifications, builds an internal model (NEIR), orchestrates execution plans, generates artifacts, validates results, and keeps projects aligned with specifications throughout their lifecycle."

